name: Sync Finance Data

on:
  schedule:
    - cron: '*/30 * * * *'  # Ogni 30 minuti
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Sync Zoho Invoice
        env:
          ZOHO_CLIENT_ID: ${{ secrets.ZOHO_CLIENT_ID }}
          ZOHO_CLIENT_SECRET: ${{ secrets.ZOHO_CLIENT_SECRET }}
          ZOHO_REFRESH_TOKEN: ${{ secrets.ZOHO_REFRESH_TOKEN }}
          ZOHO_ORG_ID: ${{ secrets.ZOHO_ORG_ID }}
        run: |
          node -e "
          const https = require('https');
          const fs = require('fs');

          function request(options, postData) {
            return new Promise((resolve, reject) => {
              const req = https.request(options, res => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try { resolve(JSON.parse(data)); }
                  catch(e) { resolve({ _raw: data }); }
                });
              });
              req.on('error', reject);
              if (postData) req.write(postData);
              req.end();
            });
          }

          async function fetchAllPages(hostname, basePath, listKey, headers, pageSize = 200) {
            let all = [];
            let page = 1;
            while (true) {
              const sep = basePath.includes('?') ? '&' : '?';
              const path = basePath + sep + 'per_page=' + pageSize + '&page=' + page;
              const res = await request({ hostname, path, method: 'GET', headers });
              const items = res[listKey] || [];
              all = all.concat(items);
              console.log('  Pagina ' + page + ': ' + items.length + ' elementi (totale: ' + all.length + ')');
              if (items.length < pageSize) break;
              page++;
            }
            return all;
          }

          async function main() {

            // ── Step 1: Ottieni access token ──
            console.log('Ottengo access token Zoho...');
            const tokenParams = new URLSearchParams({
              client_id: process.env.ZOHO_CLIENT_ID,
              client_secret: process.env.ZOHO_CLIENT_SECRET,
              refresh_token: process.env.ZOHO_REFRESH_TOKEN,
              grant_type: 'refresh_token'
            }).toString();

            const tokenRes = await request({
              hostname: 'accounts.zoho.eu',
              path: '/oauth/v2/token',
              method: 'POST',
              headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                'Content-Length': Buffer.byteLength(tokenParams)
              }
            }, tokenParams);

            if (!tokenRes.access_token) {
              console.error('Errore token:', JSON.stringify(tokenRes));
              process.exit(1);
            }

            const headers = {
              'Authorization': 'Zoho-oauthtoken ' + tokenRes.access_token,
              'X-com-zoho-invoice-organizationid': process.env.ZOHO_ORG_ID
            };

            // ── Step 2: Scarica tutto lo storico ──
            console.log('Scarico fatture (storico completo)...');
            const allInvoices = await fetchAllPages(
              'www.zohoapis.eu',
              '/invoice/v3/invoices?sort_column=date&sort_order=D',
              'invoices',
              headers
            );

            console.log('Scarico clienti...');
            const allContacts = await fetchAllPages(
              'www.zohoapis.eu',
              '/invoice/v3/contacts',
              'contacts',
              headers
            );

            // ── Step 3: Filtra — escludi draft e void ──
            const STATI_VALIDI = ['sent', 'paid', 'partial', 'overdue', 'viewed'];
            const fatture = allInvoices.filter(i => STATI_VALIDI.includes(i.status));
            console.log('Fatture totali: ' + allInvoices.length);
            console.log('Fatture valide: ' + fatture.length);

            // ── Step 4: Helper — mese di pagamento ──
            // Zoho espone last_payment_date sulla fattura: lo usiamo per sapere
            // QUANDO il cash è arrivato, allineandoci alla logica di Zoho dashboard.
            // Se la fattura è paid/partial ma non ha last_payment_date, usiamo i.date
            // come fallback (caso raro, es. fatture molto vecchie).
            function getMesePagamento(inv) {
              if (inv.last_payment_date && inv.last_payment_date.trim() !== '') {
                return inv.last_payment_date.substring(0, 7); // YYYY-MM
              }
              // fallback: data emissione
              return inv.date ? inv.date.substring(0, 7) : null;
            }

            // ── Step 5: Totali summary ──
            const fatturato = fatture.reduce((a, i) => a + (parseFloat(i.total) || 0), 0);
            const incassatoPaid = fatture
              .filter(i => i.status === 'paid')
              .reduce((a, i) => a + (parseFloat(i.total) || 0), 0);
            const incassatoParziale = fatture
              .filter(i => i.status === 'partial')
              .reduce((a, i) => a + ((parseFloat(i.total) || 0) - (parseFloat(i.balance) || 0)), 0);
            const incassato = incassatoPaid + incassatoParziale;
            const inAttesa = fatture
              .filter(i => ['sent','overdue','viewed','partial'].includes(i.status))
              .reduce((a, i) => a + (parseFloat(i.balance) || 0), 0);

            // ── Step 6: Per anno ──
            // fatturato → mese emissione (competenza)
            // incassato → mese pagamento (cassa) ← ALLINEATO A ZOHO
            const perAnno = {};
            fatture.forEach(i => {
              const annoEmissione = i.date ? i.date.substring(0, 4) : null;
              if (!annoEmissione) return;

              if (!perAnno[annoEmissione]) perAnno[annoEmissione] = { fatturato: 0, incassato: 0, inAttesa: 0, count: 0 };
              perAnno[annoEmissione].fatturato += parseFloat(i.total) || 0;
              perAnno[annoEmissione].count++;

              // inAttesa → sempre su anno emissione
              if (['sent','overdue','viewed','partial'].includes(i.status)) {
                perAnno[annoEmissione].inAttesa += parseFloat(i.balance) || 0;
              }

              // incassato → anno di pagamento
              if (i.status === 'paid' || i.status === 'partial') {
                const mesePag = getMesePagamento(i);
                const annoPag = mesePag ? mesePag.substring(0, 4) : annoEmissione;
                if (!perAnno[annoPag]) perAnno[annoPag] = { fatturato: 0, incassato: 0, inAttesa: 0, count: 0 };
                const importoIncassato = i.status === 'paid'
                  ? (parseFloat(i.total) || 0)
                  : (parseFloat(i.total) || 0) - (parseFloat(i.balance) || 0);
                perAnno[annoPag].incassato += importoIncassato;
              }
            });

            Object.keys(perAnno).forEach(a => {
              perAnno[a].fatturato = Math.round(perAnno[a].fatturato * 100) / 100;
              perAnno[a].incassato = Math.round(perAnno[a].incassato * 100) / 100;
              perAnno[a].inAttesa  = Math.round(perAnno[a].inAttesa  * 100) / 100;
            });

            // ── Step 7: Per mese ──
            // fatturato → mese emissione
            // incassato → mese pagamento ← ALLINEATO A ZOHO
            const perMese = {};
            fatture.forEach(i => {
              const meseEmissione = i.date ? i.date.substring(0, 7) : null;
              if (!meseEmissione) return;

              if (!perMese[meseEmissione]) perMese[meseEmissione] = { fatturato: 0, incassato: 0, inAttesa: 0, count: 0 };
              perMese[meseEmissione].fatturato += parseFloat(i.total) || 0;
              perMese[meseEmissione].count++;

              // inAttesa → mese emissione
              if (['sent','overdue','viewed','partial'].includes(i.status)) {
                perMese[meseEmissione].inAttesa += parseFloat(i.balance) || 0;
              }

              // incassato → mese pagamento
              if (i.status === 'paid' || i.status === 'partial') {
                const mesePag = getMesePagamento(i);
                if (!mesePag) return;
                if (!perMese[mesePag]) perMese[mesePag] = { fatturato: 0, incassato: 0, inAttesa: 0, count: 0 };
                const importoIncassato = i.status === 'paid'
                  ? (parseFloat(i.total) || 0)
                  : (parseFloat(i.total) || 0) - (parseFloat(i.balance) || 0);
                perMese[mesePag].incassato += importoIncassato;
              }
            });

            Object.keys(perMese).forEach(m => {
              perMese[m].fatturato = Math.round(perMese[m].fatturato * 100) / 100;
              perMese[m].incassato = Math.round(perMese[m].incassato * 100) / 100;
              perMese[m].inAttesa  = Math.round(perMese[m].inAttesa  * 100) / 100;
            });

            // ── Step 8: Top clienti ──
            const clientiMap = {};
            fatture.forEach(i => {
              const nome = i.customer_name || 'Sconosciuto';
              if (!clientiMap[nome]) clientiMap[nome] = { fatturato: 0, count: 0 };
              clientiMap[nome].fatturato += parseFloat(i.total) || 0;
              clientiMap[nome].count++;
            });
            const topClienti = Object.entries(clientiMap)
              .map(([nome, d]) => ({ nome, fatturato: Math.round(d.fatturato * 100) / 100, count: d.count }))
              .sort((a, b) => b.fatturato - a.fatturato)
              .slice(0, 20);

            // ── Step 9: Risultato finale ──
            const annoCorrente = new Date().getFullYear().toString();
            const result = {
              lastSync: new Date().toISOString(),
              summary: {
                fatturato: Math.round(fatturato * 100) / 100,
                incassato: Math.round(incassato * 100) / 100,
                inAttesa:  Math.round(inAttesa  * 100) / 100,
                numFatture: fatture.length,
                numClienti: allContacts.length,
                valuta: 'EUR',
                annoCorrente
              },
              perAnno,
              perMese,
              topClienti,
              invoices: fatture.sort((a,b) => new Date(b.date) - new Date(a.date)).map(i => ({
                id: i.invoice_id,
                numero: i.invoice_number,
                cliente: i.customer_name,
                data: i.date,
                dataPagamento: i.last_payment_date || '',
                totale: parseFloat(i.total) || 0,
                balance: parseFloat(i.balance) || 0,
                stato: i.status,
                valuta: i.currency_code || 'EUR',
                scadenza: i.due_date || ''
              })),
              contacts: allContacts.slice(0, 50).map(c => ({
                id: c.contact_id,
                nome: c.contact_name,
                email: c.email || '',
                tipo: c.contact_type || ''
              }))
            };

            fs.writeFileSync('finance-data.json', JSON.stringify(result, null, 2));

            console.log('');
            console.log('══════════════════════════════════════');
            console.log('✓ finance-data.json salvato');
            console.log('  Logica: fatturato = data emissione | incassato = data pagamento');
            console.log('  Fatturato: EUR ' + result.summary.fatturato.toLocaleString());
            console.log('  Incassato: EUR ' + result.summary.incassato.toLocaleString());
            console.log('  In attesa: EUR ' + result.summary.inAttesa.toLocaleString());
            console.log('  Fatture:   ' + result.summary.numFatture);
            console.log('');
            console.log('  Per anno:');
            Object.keys(perAnno).sort().forEach(a => {
              console.log('  ' + a + ': fatt EUR ' + perAnno[a].fatturato.toLocaleString() + ' | inc EUR ' + perAnno[a].incassato.toLocaleString());
            });
          }

          main().catch(e => { console.error('ERRORE:', e); process.exit(1); });
          "

      - name: Commit finance-data.json
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Finance Sync Bot"
          git add finance-data.json
          git diff --staged --quiet || git commit -m "💰 Sync Zoho $(date '+%Y-%m-%d %H:%M') — cash basis"
          git push origin HEAD:main --force-with-lease || git push origin HEAD:main --force
