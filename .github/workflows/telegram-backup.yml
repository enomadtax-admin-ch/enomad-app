name: Telegram Backup

on:
  schedule:
    - cron: '0 6 * * *'   # 07:00 CET / 08:00 CEST
    - cron: '0 13 * * *'  # 14:00 CET / 15:00 CEST
    - cron: '0 20 * * *'  # 21:00 CET / 22:00 CEST
  workflow_dispatch:       # Manuale quando vuoi

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install @supabase/supabase-js form-data

      - name: Export DB and send to Telegram
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          node -e "
          const { createClient } = require('@supabase/supabase-js');
          const https = require('https');
          const fs = require('fs');

          const supa = createClient(process.env.SUPABASE_URL, process.env.SUPABASE_SERVICE_KEY);

          function telegramRequest(path, data) {
            return new Promise((resolve, reject) => {
              const postData = JSON.stringify(data);
              const options = {
                hostname: 'api.telegram.org',
                path: '/bot' + process.env.TELEGRAM_BOT_TOKEN + path,
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Content-Length': Buffer.byteLength(postData)
                }
              };
              const req = https.request(options, res => {
                let body = '';
                res.on('data', c => body += c);
                res.on('end', () => resolve(JSON.parse(body)));
              });
              req.on('error', reject);
              req.write(postData);
              req.end();
            });
          }

          async function sendFile(filePath, caption) {
            const FormData = require('form-data');
            const form = new FormData();
            form.append('chat_id', process.env.TELEGRAM_CHAT_ID);
            form.append('caption', caption);
            form.append('document', fs.createReadStream(filePath));

            return new Promise((resolve, reject) => {
              const options = {
                hostname: 'api.telegram.org',
                path: '/bot' + process.env.TELEGRAM_BOT_TOKEN + '/sendDocument',
                method: 'POST',
                headers: form.getHeaders()
              };
              const req = https.request(options, res => {
                let body = '';
                res.on('data', c => body += c);
                res.on('end', () => resolve(JSON.parse(body)));
              });
              req.on('error', reject);
              form.pipe(req);
            });
          }

          async function main() {
            console.log('Esporto dati da Supabase...');
            const now = new Date();
            const timestamp = new Intl.DateTimeFormat('it-IT', {
              timeZone: 'Europe/Rome',
              year: 'numeric', month: '2-digit', day: '2-digit',
              hour: '2-digit', minute: '2-digit'
            }).format(now);
            const dateStr = now.toISOString().split('T')[0];

            const tables = ['entita', 'scadenze', 'servizi_ricorrenti', 'movimenti_manuali', 'tipi_scadenza', 'listino'];
            const backup = { exportedAt: now.toISOString(), tables: {} };

            for (const table of tables) {
              const { data, error } = await supa.from(table).select('*');
              if (error) {
                console.warn('Skip ' + table + ':', error.message);
                backup.tables[table] = [];
              } else {
                backup.tables[table] = data;
                console.log('  ' + table + ': ' + data.length + ' righe');
              }
            }

            const total = Object.values(backup.tables).reduce((a, t) => a + t.length, 0);
            const filename = 'enomad-backup-' + dateStr + '.json';
            fs.writeFileSync(filename, JSON.stringify(backup, null, 2));
            console.log('File creato: ' + filename + ' (' + total + ' record totali)');

            const msg = '\uD83D\uDDC4 *Enomad Backup*\n' +
              '\uD83D\uDCC5 ' + timestamp + '\n\n' +
              '\uD83D\uDCCA *Riepilogo:*\n' +
              '\uD83D\uDC65 Clienti: ' + (backup.tables.entita?.length || 0) + '\n' +
              '\uD83D\uDCC5 Scadenze: ' + (backup.tables.scadenze?.length || 0) + '\n' +
              '\u267B Servizi ricorrenti: ' + (backup.tables.servizi_ricorrenti?.length || 0) + '\n' +
              '\uD83D\uDCB8 Movimenti manuali: ' + (backup.tables.movimenti_manuali?.length || 0) + '\n' +
              '\uD83D\uDCCB Listino: ' + (backup.tables.listino?.length || 0) + '\n\n' +
              '\u2705 Backup completato \u2014 ' + total + ' record totali';

            const msgRes = await telegramRequest('/sendMessage', {
              chat_id: process.env.TELEGRAM_CHAT_ID,
              text: msg,
              parse_mode: 'Markdown'
            });
            console.log('Messaggio inviato:', msgRes.ok);

            const fileRes = await sendFile(filename, '\uD83D\uDCE6 Backup completo ' + dateStr);
            console.log('File inviato:', fileRes.ok);
            console.log('\u2713 Backup completato');
          }

          main().catch(e => { console.error('ERRORE:', e); process.exit(1); });
          "
