name: Telegram Backup

on:
  schedule:
    - cron: '0 7 * * *'   # 08:00 CET (07:00 UTC)
    - cron: '0 13 * * *'  # 14:00 CET (13:00 UTC)
    - cron: '0 19 * * *'  # 20:00 CET (19:00 UTC)
  workflow_dispatch:       # Manuale quando vuoi

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Supabase client
        run: npm install @supabase/supabase-js

      - name: Export DB and send to Telegram
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          node -e "
          const { createClient } = require('@supabase/supabase-js');
          const https = require('https');
          const fs = require('fs');

          const supa = createClient(process.env.SUPABASE_URL, process.env.SUPABASE_SERVICE_KEY);

          function telegramRequest(path, data, isFormData) {
            return new Promise((resolve, reject) => {
              const postData = JSON.stringify(data);
              const options = {
                hostname: 'api.telegram.org',
                path: '/bot' + process.env.TELEGRAM_BOT_TOKEN + path,
                method: 'POST',
                headers: isFormData ? data.getHeaders() : {
                  'Content-Type': 'application/json',
                  'Content-Length': Buffer.byteLength(postData)
                }
              };
              const req = https.request(options, res => {
                let body = '';
                res.on('data', c => body += c);
                res.on('end', () => resolve(JSON.parse(body)));
              });
              req.on('error', reject);
              if (!isFormData) req.write(postData);
              req.end();
            });
          }

          async function sendFile(filePath, caption) {
            const FormData = require('form-data');
            const form = new FormData();
            form.append('chat_id', process.env.TELEGRAM_CHAT_ID);
            form.append('caption', caption);
            form.append('document', fs.createReadStream(filePath));

            return new Promise((resolve, reject) => {
              const options = {
                hostname: 'api.telegram.org',
                path: '/bot' + process.env.TELEGRAM_BOT_TOKEN + '/sendDocument',
                method: 'POST',
                headers: form.getHeaders()
              };
              const req = https.request(options, res => {
                let body = '';
                res.on('data', c => body += c);
                res.on('end', () => resolve(JSON.parse(body)));
              });
              req.on('error', reject);
              form.pipe(req);
            });
          }

          async function main() {
            console.log('Esporto dati da Supabase...');
            const now = new Date();
            const timestamp = now.toISOString().replace('T', ' ').substring(0, 16);
            const dateStr = now.toISOString().split('T')[0];

            const tables = ['entita', 'scadenze', 'servizi_ricorrenti', 'movimenti_manuali', 'tipi_scadenza', 'listino'];
            const backup = { exportedAt: now.toISOString(), tables: {} };

            for (const table of tables) {
              const { data, error } = await supa.from(table).select('*');
              if (error) {
                console.warn('Skip ' + table + ':', error.message);
                backup.tables[table] = [];
              } else {
                backup.tables[table] = data;
                console.log('  ' + table + ': ' + data.length + ' righe');
              }
            }

            const total = Object.values(backup.tables).reduce((a, t) => a + t.length, 0);
            const filename = 'enomad-backup-' + dateStr + '.json';
            fs.writeFileSync(filename, JSON.stringify(backup, null, 2));
            console.log('File creato: ' + filename + ' (' + total + ' record totali)');

            // Messaggio di riepilogo
            const msg = '🗄 *Enomad Backup*\n' +
              '📅 ' + timestamp + ' CET\n\n' +
              '📊 *Riepilogo:*\n' +
              '👥 Clienti: ' + (backup.tables.entita?.length || 0) + '\n' +
              '📅 Scadenze: ' + (backup.tables.scadenze?.length || 0) + '\n' +
              '♻ Servizi ricorrenti: ' + (backup.tables.servizi_ricorrenti?.length || 0) + '\n' +
              '💸 Movimenti manuali: ' + (backup.tables.movimenti_manuali?.length || 0) + '\n' +
              '📋 Listino: ' + (backup.tables.listino?.length || 0) + '\n\n' +
              '✅ Backup completato — ' + total + ' record totali';

            // Invia messaggio testo
            await telegramRequest('/sendMessage', {
              chat_id: process.env.TELEGRAM_CHAT_ID,
              text: msg,
              parse_mode: 'Markdown'
            });

            // Invia file JSON
            await sendFile(filename, '📦 Backup completo ' + dateStr);
            console.log('✓ Backup inviato su Telegram');
          }

          main().catch(e => { console.error('ERRORE:', e); process.exit(1); });
          "
