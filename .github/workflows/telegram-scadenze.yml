name: Daily Deadlines Reminder

on:
  schedule:
    - cron: '0 6 * * *'  # 08:00 Swiss time (UTC+2 summer)
  workflow_dispatch:      # Manual trigger for testing

jobs:
  remind:
    runs-on: ubuntu-latest

    steps:
      - name: Send Deadlines Digest to Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_SCADENZE_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          node -e "
          const https = require('https');

          function request(options, postData) {
            return new Promise((resolve, reject) => {
              const req = https.request(options, res => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try { resolve(JSON.parse(data)); }
                  catch(e) { resolve({ _raw: data }); }
                });
              });
              req.on('error', reject);
              if (postData) req.write(postData);
              req.end();
            });
          }

          async function fetchSupabase(path) {
            const url = new URL(process.env.SUPABASE_URL);
            const res = await request({
              hostname: url.hostname,
              path: '/rest/v1/' + path,
              method: 'GET',
              headers: {
                'apikey': process.env.SUPABASE_KEY,
                'Authorization': 'Bearer ' + process.env.SUPABASE_KEY,
                'Content-Type': 'application/json'
              }
            });
            return res;
          }

          async function sendTelegram(text) {
            const body = JSON.stringify({
              chat_id: process.env.TELEGRAM_CHAT_ID,
              text: text,
              parse_mode: 'HTML'
            });
            await request({
              hostname: 'api.telegram.org',
              path: '/bot' + process.env.TELEGRAM_TOKEN + '/sendMessage',
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Content-Length': Buffer.byteLength(body)
              }
            }, body);
          }

          function daysTo(dateStr) {
            const today = new Date();
            today.setHours(0,0,0,0);
            const target = new Date(dateStr);
            target.setHours(0,0,0,0);
            return Math.ceil((target - today) / 86400000);
          }

          function formatDate(dateStr) {
            if (!dateStr) return '—';
            const [y,m,d] = dateStr.split('-');
            return d + '/' + m + '/' + y;
          }

          function formatAmount(n) {
            if (!n || n === 0) return '';
            return ' · €' + Math.round(n).toLocaleString('it-IT');
          }

          function dayLabel(d) {
            if (d === 0) return 'TODAY';
            if (d === 1) return 'tomorrow';
            return d + 'd';
          }

          const DAYS_OF_WEEK = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
          const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

          async function main() {
            // Fetch all pending deadlines from Supabase
            const scadenze = await fetchSupabase(
              \"scadenze?stato=neq.done&order=data.asc&select=*\"
            );

            if (!Array.isArray(scadenze)) {
              console.error('Supabase error:', JSON.stringify(scadenze));
              process.exit(1);
            }

            const today = new Date();
            const dow = DAYS_OF_WEEK[today.getDay()];
            const dateLabel = dow + ' ' + today.getDate() + ' ' + MONTHS[today.getMonth()] + ' ' + today.getFullYear();

            // Split into groups
            const overdue   = scadenze.filter(s => daysTo(s.data) < 0);
            const dueToday  = scadenze.filter(s => daysTo(s.data) === 0);
            const critical  = scadenze.filter(s => daysTo(s.data) > 0 && daysTo(s.data) <= 7);
            const upcoming  = scadenze.filter(s => daysTo(s.data) > 7  && daysTo(s.data) <= 30);

            // Only send if there is something to report
            const total = overdue.length + dueToday.length + critical.length + upcoming.length;

            let msg = '<b>📋 ENOMAD — Deadlines · ' + dateLabel + '</b>\n';
            msg += '<i>' + scadenze.length + ' active deadlines</i>\n';

            // OVERDUE
            if (overdue.length > 0) {
              msg += '\n<b>⛔ OVERDUE (' + overdue.length + ')</b>\n';
              overdue.forEach(s => {
                const d = daysTo(s.data);
                msg += '  • <b>' + (s.entita || '—') + '</b> · ' + (s.tipo || s.nome || '—') + ' · ' + formatDate(s.data) + ' · ' + Math.abs(d) + 'd ago' + formatAmount(s.prezzo) + '\n';
              });
            }

            // DUE TODAY
            if (dueToday.length > 0) {
              msg += '\n<b>🔔 DUE TODAY (' + dueToday.length + ')</b>\n';
              dueToday.forEach(s => {
                msg += '  • <b>' + (s.entita || '—') + '</b> · ' + (s.tipo || s.nome || '—') + formatAmount(s.prezzo) + '\n';
              });
            }

            // CRITICAL ≤7 days
            if (critical.length > 0) {
              msg += '\n<b>🔴 CRITICAL — due in ≤7 days (' + critical.length + ')</b>\n';
              critical.forEach(s => {
                const d = daysTo(s.data);
                msg += '  • <b>' + (s.entita || '—') + '</b> · ' + (s.tipo || s.nome || '—') + ' · ' + formatDate(s.data) + ' · ' + dayLabel(d) + formatAmount(s.prezzo) + '\n';
              });
            }

            // UPCOMING 8–30 days
            if (upcoming.length > 0) {
              msg += '\n<b>🟡 UPCOMING — next 30 days (' + upcoming.length + ')</b>\n';
              upcoming.forEach(s => {
                const d = daysTo(s.data);
                msg += '  • <b>' + (s.entita || '—') + '</b> · ' + (s.tipo || s.nome || '—') + ' · ' + formatDate(s.data) + ' · ' + dayLabel(d) + formatAmount(s.prezzo) + '\n';
              });
            }

            // All clear
            if (total === 0) {
              msg += '\n✅ <b>All clear — no deadlines in the next 30 days.</b>\n';
            }

            // Footer
            msg += '\n<i>E-NOMAD Compliance System</i>';

            await sendTelegram(msg);
            console.log('✓ Digest sent — ' + total + ' deadlines reported');
          }

          main().catch(e => { console.error('ERROR:', e); process.exit(1); });
          "
