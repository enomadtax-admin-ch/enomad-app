name: Daily Deadlines Reminder

on:
  schedule:
    - cron: '0 6 * * *'  # 08:00 Swiss time (UTC+2 summer)
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch deadlines from Supabase
        id: fetch
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          RESPONSE=$(curl -s \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            "$SUPABASE_URL/rest/v1/scadenze?stato=neq.done&order=data.asc&select=*")
          echo "data<<EOF_DATA" >> $GITHUB_OUTPUT
          echo "$RESPONSE" >> $GITHUB_OUTPUT
          echo "EOF_DATA" >> $GITHUB_OUTPUT

      - name: Build and send Telegram message
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_SCADENZE_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SCADENZE_JSON: ${{ steps.fetch.outputs.data }}
        run: |
          node << 'NODEJS'
          const https = require('https');

          function sendTelegram(text) {
            return new Promise((resolve, reject) => {
              const body = JSON.stringify({
                chat_id: process.env.TELEGRAM_CHAT_ID,
                text: text,
                parse_mode: 'HTML'
              });
              const req = https.request({
                hostname: 'api.telegram.org',
                path: '/bot' + process.env.TELEGRAM_TOKEN + '/sendMessage',
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Content-Length': Buffer.byteLength(body)
                }
              }, res => {
                let d = '';
                res.on('data', c => d += c);
                res.on('end', () => resolve(JSON.parse(d)));
              });
              req.on('error', reject);
              req.write(body);
              req.end();
            });
          }

          function daysTo(dateStr) {
            const today = new Date();
            today.setHours(0,0,0,0);
            const target = new Date(dateStr);
            target.setHours(0,0,0,0);
            return Math.ceil((target - today) / 86400000);
          }

          function formatDate(s) {
            if (!s) return '—';
            const [y,m,d] = s.split('-');
            return d+'/'+m;
          }

          function formatAmt(n) {
            if (!n || n === 0) return '';
            return ' · €' + Math.round(n).toLocaleString('de-CH');
          }

          function dayLabel(d) {
            if (d === 0) return 'TODAY';
            if (d === 1) return 'tomorrow';
            return d + 'd';
          }

          const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
          const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

          async function main() {
            let scadenze;
            try {
              scadenze = JSON.parse(process.env.SCADENZE_JSON);
            } catch(e) {
              console.error('JSON parse error:', e.message);
              console.error('Raw:', (process.env.SCADENZE_JSON||'').substring(0,300));
              process.exit(1);
            }

            if (!Array.isArray(scadenze)) {
              console.error('Not an array:', JSON.stringify(scadenze).substring(0,200));
              process.exit(1);
            }

            const today = new Date();
            const dateLabel = DAYS[today.getDay()] + ' ' + today.getDate() + ' ' + MONTHS[today.getMonth()] + ' ' + today.getFullYear();

            const overdue  = scadenze.filter(s => daysTo(s.data) < 0);
            const dueToday = scadenze.filter(s => daysTo(s.data) === 0);
            const critical = scadenze.filter(s => daysTo(s.data) > 0 && daysTo(s.data) <= 7);
            const upcoming = scadenze.filter(s => daysTo(s.data) > 7  && daysTo(s.data) <= 30);
            const total    = overdue.length + dueToday.length + critical.length + upcoming.length;

            let msg = '<b>📋 ENOMAD — Deadlines · ' + dateLabel + '</b>\n';
            msg += '<i>' + scadenze.length + ' active deadlines</i>\n';

            if (overdue.length > 0) {
              msg += '\n<b>⛔ OVERDUE (' + overdue.length + ')</b>\n';
              overdue.slice(0,10).forEach(s => {
                const d = Math.abs(daysTo(s.data));
                msg += '  • <b>' + (s.entita||'—') + '</b> · ' + (s.tipo||s.nome||'—') + ' · ' + formatDate(s.data) + ' · ' + d + 'd ago' + formatAmt(s.prezzo) + '\n';
              });
            }

            if (dueToday.length > 0) {
              msg += '\n<b>🔔 DUE TODAY (' + dueToday.length + ')</b>\n';
              dueToday.forEach(s => {
                msg += '  • <b>' + (s.entita||'—') + '</b> · ' + (s.tipo||s.nome||'—') + formatAmt(s.prezzo) + '\n';
              });
            }

            if (critical.length > 0) {
              msg += '\n<b>🔴 CRITICAL ≤7d (' + critical.length + ')</b>\n';
              critical.forEach(s => {
                const d = daysTo(s.data);
                msg += '  • <b>' + (s.entita||'—') + '</b> · ' + (s.tipo||s.nome||'—') + ' · ' + formatDate(s.data) + ' · ' + dayLabel(d) + formatAmt(s.prezzo) + '\n';
              });
            }

            if (upcoming.length > 0) {
              msg += '\n<b>🟡 UPCOMING 8–30d (' + upcoming.length + ')</b>\n';
              upcoming.forEach(s => {
                const d = daysTo(s.data);
                msg += '  • <b>' + (s.entita||'—') + '</b> · ' + (s.tipo||s.nome||'—') + ' · ' + formatDate(s.data) + ' · ' + dayLabel(d) + formatAmt(s.prezzo) + '\n';
              });
            }

            if (total === 0) {
              msg += '\n✅ <b>All clear — no deadlines in the next 30 days.</b>\n';
            }

            msg += '\n<i>E-NOMAD Compliance System</i>';

            const result = await sendTelegram(msg);
            if (result.ok) {
              console.log('✓ Message sent — ' + total + ' deadlines reported');
            } else {
              console.error('Telegram error:', JSON.stringify(result));
              process.exit(1);
            }
          }

          main().catch(e => { console.error('ERROR:', e); process.exit(1); });
          NODEJS
